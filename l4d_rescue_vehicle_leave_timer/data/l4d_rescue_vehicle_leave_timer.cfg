"rescue_vehicle"
{
	// If cvar not set in "xxx" (map name) selection, the plugin will use "default" (Global) selection
	// 如果在 "xxx" (地圖名) 區段沒有找到參數, 則會使用 "default" 區段預設的參數

	//Default settings
	//預設參數
	"default"
	{
		// Set timer to escape (seconds), 0=Disable in this map
		// - 
		// 逃跑上載具的時間, 0=在這張圖關閉此插件
		// 設置逃亡時間
		"time"		"50"
		
		// Changes how count down tumer hint displays. (0: Disable, 1:In chat, 2: In Hint Box, 3: In center text)
		// 倒數提示該如何顯示. (0: 不提示, 1: 聊天框, 2: 黑底白字框, 3: 螢幕正中間)
		"announce_type"	"2"
		
		// (L4D2) 1=Enable AirStrike (explosion, missile, jets, fire)
		//( L4D2) 0=Disable AirStrike, prevent laggy
        // (L4D2) 為1時，啟用空軍轟炸特效 (爆炸, 導彈, 噴射機, 火焰....)
        // (L4D2) 為0時，關閉空軍轟炸，避免太lag
		"airstrike_enable" "1"
	}
	
