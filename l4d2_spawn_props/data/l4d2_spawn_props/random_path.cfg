"l4d2_spawn_props"
{
	// Stripper Config Path by default if gamemode name and map name not found
	// 沒設置遊戲模式與地圖名時預設的地圖文件路徑
	"stripper_cfg_path_default" "addons/stripper"
		
	// 沒設置地圖時則使用"default"
	// Load "default" settings If map not found
	"default"
	{
		// gamemode name
		// 遊戲模式名稱
		"coop"
		{
			// total numbers of path to select (choosing random path on map loading)
			// 共有地圖路徑可選	(每次地圖載入時隨機挑選)
			"total"     "1"


			// First path set, Stripper Config Path
			// 第一個地圖文件路徑
			"1"    "addons/stripper/coop_1"
		}

		"versus"
		{
			"total"     "2"

			"1"    "addons/stripper/versus_1"
			"2"    "addons/stripper/versus_2"
		}
		
		"mutation9"
		{
			"total"     "1"

			"1"    "addons/stripper/mutation9_1"
		}
	}
	
